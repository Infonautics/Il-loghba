<!DOCTYPE html>
<html lang="mt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malti tal-Jum | Daily Quiz</title>
    <style>
        :root { --nyt-black: #121213; --nyt-gray: #787c7e; --correct: #6aaa64; --error: #e76f51; --bg: #ffffff; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--nyt-black); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; border-top: 3px solid var(--nyt-black); padding-top: 10px; }
        
        .header-meta { display: flex; justify-content: space-between; font-family: sans-serif; font-size: 0.75rem; text-transform: uppercase; color: var(--nyt-gray); margin-bottom: 15px; align-items: center; }
        .streak-badge { background: #f0f0f0; padding: 4px 8px; border-radius: 12px; color: #333; font-weight: bold; }
        
        .quiz-header { background: #fdfdfd; padding: 20px 15px; text-align: center; border: 1px solid #f0f0f0; margin-bottom: 20px; border-radius: 4px; }
        .quiz-title { font-family: sans-serif; font-weight: bold; letter-spacing: 2px; color: var(--nyt-gray); font-size: 0.8rem; margin-bottom: 5px; }
        .quiz-topic { font-size: 1.8rem; font-weight: bold; margin: 0; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-family: sans-serif; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; color: #333; }
        input { width: 100%; padding: 12px; font-size: 1.1rem; border: 2px solid #e5e5e5; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--nyt-black); background: #fafafa; }
        input.correct { border-color: var(--correct); background: #f6fff6; color: #2a5d34; font-weight: bold; }

        .button-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { width: 100%; padding: 16px; font-size: 1rem; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; font-family: sans-serif; transition: 0.2s; }
        .btn-check { background: var(--nyt-black); color: white; }
        .btn-reveal { background: #eee; color: #444; }
        .btn-share { background: var(--correct); color: white; display: none; }
        
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; display: none; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-meta">
        <span id="dateHeader"></span>
        <span class="streak-badge">🔥 <span id="streakCount">0</span> Jum</span>
    </div>

    <div class="quiz-header">
        <div class="quiz-title">PROVA TAL-GRAMMATIKA</div>
        <div class="quiz-topic" id="topicDisplay"></div>
    </div>

    <div id="quizContainer"></div>

    <div class="button-stack">
        <button class="btn-check" id="checkBtn" onclick="check()">IĊĊEKKJA</button>
        <button class="btn-reveal" id="revealBtn" onclick="reveal()">URI T-TWEĠIBIET</button>
        <button class="btn-share" id="shareBtn" onclick="shareResults()">IXXAQQAM IR-RIŻULTATI</button>
    </div>

    <div id="result"></div>
</div>

<script>
    // 5 Questions per day. You can add as many daily objects as you like.
    const quizzes = [
        {
            topic: "Il-Verbi (Wash)",
            questions: [
                { q: "I washed (Maltese)", a: "ħsilt" },
                { q: "She washes", a: "taħsel" },
                { q: "We will wash", a: "naħslu" },
                { q: "Wash it! (m)", a: "ħaslu" },
                { q: "Wash me!", a: "aħsilni" }
            ]
        },
        {
            topic: "L-Artiklu (The)",
            questions: [
                { q: "The table (mejda)", a: "il-mejda" },
                { q: "The sun (xemx)", a: "ix-xemx" },
                { q: "The child (tifel)", a: "it-tifel" },
                { q: "The oil (żejt)", a: "iż-żejt" },
                { q: "The box (kaxxa)", a: "il-kaxxa" }
            ]
        },
        {
            topic: "Plural (Broken)",
            questions: [
                { q: "Dar (House) ->", a: "djar" },
                { q: "Tifel (Boy) ->", a: "tfal" },
                { q: "Kelb (Dog) ->", a: "klieb" },
                { q: "Ktieb (Book) ->", a: "kotba" },
                { q: "Siġġu (Chair) ->", a: "siġġijiet" }
            ]
        }
    ];

    const today = new Date();
    const start = new Date(today.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((today - start) / 86400000);
    const dateKey = today.toLocaleDateString('en-MT');
    
    // Select quiz based on day
    const dailyQuiz = quizzes[dayOfYear % quizzes.length];

    // Stats Management
    let stats = JSON.parse(localStorage.getItem('malteseGrammarStats')) || { streak: 0, lastDate: "", wonToday: false };

    if (stats.lastDate !== dateKey) {
        stats.wonToday = false;
        const yesterday = new Date(today);
        yesterday.setDate(today.getDate() - 1);
        if (stats.lastDate !== yesterday.toLocaleDateString('en-MT') && stats.lastDate !== "") {
            stats.streak = 0;
        }
    }

    // UI Initialization
    document.getElementById('dateHeader').innerText = today.toLocaleDateString('en-MT', { day: 'numeric', month: 'short', year: 'numeric' });
    document.getElementById('streakCount').innerText = stats.streak;
    document.getElementById('topicDisplay').innerText = dailyQuiz.topic;

    const quizContainer = document.getElementById('quizContainer');
    dailyQuiz.questions.forEach((item, index) => {
        const group = document.createElement('div');
        group.className = 'input-group';
        group.innerHTML = `
            <label>${index + 1}. ${item.q}</label>
            <input type="text" class="quiz-input" id="q${index}" spellcheck="false" autocomplete="off">
        `;
        quizContainer.appendChild(group);
    });

    if (stats.wonToday) lockGame();

    function check() {
        const inputs = document.querySelectorAll('.quiz-input');
        let allCorrect = true;
        
        inputs.forEach((input, i) => {
            if (input.value.trim().toLowerCase() === dailyQuiz.questions[i].a.toLowerCase()) {
                input.classList.add('correct');
            } else {
                input.classList.remove('correct');
                allCorrect = false;
            }
        });

        const res = document.getElementById('result');
        res.style.display = "block";

        if (allCorrect) {
            handleWin();
        } else {
            res.style.background = "#fce8e6";
            res.style.color = "#a52a2a";
            res.innerText = "Xi tweġibiet mhumiex tajbin. Erġa' pprova!";
        }
    }

    function handleWin() {
        if (!stats.wonToday) {
            stats.streak++;
            stats.wonToday = true;
            stats.lastDate = dateKey;
            localStorage.setItem('malteseGrammarStats', JSON.stringify(stats));
        }
        document.getElementById('streakCount').innerText = stats.streak;
        const res = document.getElementById('result');
        res.style.background = "#e6f4ea";
        res.style.color = "#2a5d34";
        res.innerText = "Prosit! Kollox sew għal-lum.";
        lockGame();
    }

    function lockGame() {
        const inputs = document.querySelectorAll('.quiz-input');
        inputs.forEach((input, i) => {
            input.value = dailyQuiz.questions[i].a;
            input.disabled = true;
            input.classList.add('correct');
        });
        document.getElementById('checkBtn').style.display = "none";
        document.getElementById('revealBtn').style.display = "none";
        document.getElementById('shareBtn').style.display = "block";
    }

    function reveal() {
        const res = document.getElementById('result');
        res.style.display = "block";
        res.style.background = "#f4f4f4";
        res.style.color = "#333";
        res.innerHTML = "<b>Tweġibiet:</b> " + dailyQuiz.questions.map(q => q.a).join(', ');
    }

    function shareResults() {
        const score = "✅✅✅✅✅";
        const text = `Malti tal-Jum (${dateKey})\nGrammatika: ${dailyQuiz.topic}\n${score}\n🔥 Streak: ${stats.streak} jum\n#Malti #Maltese`;
        navigator.clipboard.writeText(text).then(() => {
            alert("Ir-riżultati ġew ikkupjati!");
        });
    }
</script>
</body>
</html>
